entities:
  - name: loan_example_entity
    join_keys: 
      - LOAN_ID

# Warehouse configuration for feature store operations
# One warehouse must be marked as 'default: true' for the feature store
# Additional warehouses can be referenced by feature views via 'warehouse' field
warehouses:
  - name: FEATURE_STORE
    warehouse_size: SMALL
    auto_suspend: 300
    default: true
  # Example of an additional warehouse for heavy feature computations
  # - name: HEAVY_COMPUTE
  #   warehouse_size: LARGE
  #   auto_suspend: 60

feature_views:
  - name: example_features
    function: create_example_features
    entities: loan_example_entity
    timestamp_col: TIMESTAMP
    desc: Example features for example entity
    #warehouse: HEAVY_COMPUTE  # Optional: specify a non-default warehouse
    refresh_freq: 1 day
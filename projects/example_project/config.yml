project_name: example_project

deploy:
  DAGS:
    - name: EXAMPLE1
      tasks:
        - name: training
          file: training.ipynb
      schedule: CRON 30 3 * * * UTC
    - name: EXAMPLE2
      tasks:
        - name: inference
          file: inference.py
          mljob: True
      schedule: 3 HOURS
    - name: EXAMPLE3
      tasks:
        - name: prepare
          file: prepare_data.py
        - name: train
          file: training.py
